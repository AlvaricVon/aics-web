<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="robots" content="noindex" />
<title>AICS chat widget</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --brand:#C2410C;
    --brand-hover:#9A3412;
    --brand-bg:#FFF7ED;
    --bg:#FAFAF7;
    --surface:#FFFFFF;
    --surface-alt:#F5F4F1;
    --text:#1C1917;
    --text-soft:#44403C;
    --muted:#78716C;
    --border:#E7E5E4;
    --success:#15803D;
    --warning:#D97706;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden}
  body{
    font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    background:var(--surface);color:var(--text);font-size:14.5px;line-height:1.5;
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* ─── HEADER ─── */
  .head{
    display:flex;align-items:center;gap:12px;
    padding:14px 16px;background:var(--brand);color:#fff;
    box-shadow:0 1px 0 rgba(0,0,0,.04);
  }
  .head .avatar{
    width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.16);
    display:grid;place-items:center;font-weight:800;font-size:13px;letter-spacing:-.02em;
    backdrop-filter:blur(6px);
  }
  .head .meta{flex:1;min-width:0}
  .head .name{
    font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;letter-spacing:-.01em;
  }
  .head .name::before{
    content:"";width:7px;height:7px;border-radius:50%;background:#86EFAC;
    box-shadow:0 0 0 3px rgba(134,239,172,.30);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{50%{box-shadow:0 0 0 6px rgba(134,239,172,0)}}
  .head .status{font-size:11.5px;opacity:.85;font-family:'JetBrains Mono',monospace}
  .head .close{
    width:30px;height:30px;border-radius:7px;display:grid;place-items:center;
    background:rgba(255,255,255,.10);transition:background .15s;
  }
  .head .close:hover{background:rgba(255,255,255,.20)}
  .head .close svg{width:16px;height:16px;color:#fff}

  /* ─── BODY ─── */
  .body{
    flex:1;overflow-y:auto;padding:18px 16px;
    background:var(--bg);
    display:flex;flex-direction:column;gap:14px;
    scrollbar-width:thin;scrollbar-color:#D6D3D1 transparent;
  }
  .body::-webkit-scrollbar{width:6px}
  .body::-webkit-scrollbar-thumb{background:#D6D3D1;border-radius:3px}

  .msg{display:flex;gap:8px;max-width:88%}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg .bubble{
    padding:10px 13px;border-radius:13px;font-size:14px;line-height:1.5;
    word-wrap:break-word;
  }
  .msg.bot .bubble{
    background:var(--surface);border:1px solid var(--border);
    border-bottom-left-radius:4px;color:var(--text);
    box-shadow:0 1px 1px rgba(28,25,23,.02);
  }
  .msg.user .bubble{
    background:var(--brand);color:#fff;border-bottom-right-radius:4px;
  }
  .msg-meta{
    display:flex;align-items:center;gap:6px;flex-wrap:wrap;
    margin-top:6px;font-size:10.5px;
  }
  .badge-mono{
    font-family:'JetBrains Mono',monospace;font-size:9.5px;
    letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:3px;
    font-weight:600;border:1px solid transparent;line-height:1;
  }
  .badge-resolved{background:rgba(21,128,61,.10);color:var(--success);border-color:rgba(21,128,61,.20)}
  .badge-escalated{background:rgba(217,119,6,.10);color:var(--warning);border-color:rgba(217,119,6,.22)}
  .badge-await{background:rgba(28,25,23,.06);color:var(--text-soft);border-color:var(--border)}

  .typing{display:inline-flex;gap:3px;align-items:center}
  .typing span{
    width:6px;height:6px;border-radius:50%;background:var(--muted);
    animation:typ 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2){animation-delay:.15s}
  .typing span:nth-child(3){animation-delay:.3s}
  @keyframes typ{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}

  /* ─── CHIPS ─── */
  .chips{display:flex;flex-wrap:wrap;gap:6px;padding:6px 16px 0;background:var(--bg)}
  .chip{
    font-size:12.5px;padding:6px 11px;border:1px solid var(--border);
    background:var(--surface);border-radius:999px;color:var(--text-soft);
    cursor:pointer;transition:all .12s;
  }
  .chip:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-bg)}

  /* ─── INPUT ─── */
  .input{
    display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border);
    background:var(--surface);
  }
  .input input{
    flex:1;border:1px solid var(--border);border-radius:999px;
    padding:10px 14px;font-family:inherit;font-size:14px;outline:none;
    background:var(--bg);color:var(--text);transition:border-color .12s;
  }
  .input input:focus{border-color:var(--text)}
  .send{
    width:38px;height:38px;border-radius:50%;background:var(--brand);color:#fff;
    display:grid;place-items:center;transition:background .12s,transform .12s;flex-shrink:0;
  }
  .send:hover{background:var(--brand-hover);transform:scale(1.04)}
  .send:disabled{background:#D6D3D1;cursor:not-allowed;transform:none}

  /* ─── FOOTER ─── */
  .foot{
    text-align:center;padding:8px;
    font-size:10.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;
    background:var(--bg);border-top:1px solid var(--border);
  }
  .foot a{color:var(--text-soft);font-weight:600}
</style>
</head>
<body>

<div class="head">
  <div class="avatar" id="botAvatar">AI</div>
  <div class="meta">
    <div class="name" id="botName">Asisten Toko</div>
    <div class="status">online · biasanya balas dalam beberapa detik</div>
  </div>
  <button class="close" id="closeBtn" aria-label="Tutup">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
  </button>
</div>

<div class="body" id="chatBody">
  <div class="msg bot">
    <div>
      <div class="bubble" id="welcome">Halo! Saya asisten AI dari toko ini. Ada yang bisa saya bantu?</div>
    </div>
  </div>
</div>

<div class="chips" id="chips">
  <button class="chip" data-msg="Status pesanan saya bagaimana?">Status pesanan</button>
  <button class="chip" data-msg="Bagaimana cara refund?">Cara refund</button>
  <button class="chip" data-msg="Bagaimana cara reset password?">Reset password</button>
  <button class="chip" data-msg="Saya mau lihat produk yang tersedia">Lihat produk</button>
</div>

<form class="input" id="chatForm">
  <input type="text" id="chatInput" placeholder="Tulis pesan…" autocomplete="off" />
  <button class="send" type="submit" id="sendBtn" aria-label="Kirim">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</form>

<div class="foot">powered by <a href="https://aics-web.vercel.app" target="_blank">AICS</a></div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0';
  const SUPABASE_URL = 'https://stcywvcnbbapshrzqblk.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_WUxbFG3866P7BANLSqv-Sw_4NcXMLSr';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ─── Extract tenant slug from URL ───
  const params = new URLSearchParams(location.search);
  const tenant = params.get('t') || params.get('tenant') || 'demo';
  const sessionId = 'sesi_'+Math.random().toString(36).slice(2,10);

  const body = document.getElementById('chatBody');
  const form = document.getElementById('chatForm');
  const input = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const chips = document.getElementById('chips');
  const botName = document.getElementById('botName');
  const welcome = document.getElementById('welcome');
  const botAvatar = document.getElementById('botAvatar');

  // ─── Load tenant config ───
  async function loadConfig(){
    try{
      const { data, error } = await supabase.rpc('get_tenant_config',{ p_slug: tenant });
      if(error || !data) return;
      if(data.bot_name){ botName.textContent = data.bot_name; botAvatar.textContent = data.bot_name.slice(0,2).toUpperCase(); }
      if(data.welcome_message) welcome.textContent = data.welcome_message;
      if(data.brand_color){
        document.documentElement.style.setProperty('--brand', data.brand_color);
        document.documentElement.style.setProperty('--brand-hover', shade(data.brand_color, -15));
      }
    }catch(e){ /* config load best-effort */ }
  }
  function shade(hex, percent){
    // simple shade for hover
    const c = hex.replace('#',''); const n = parseInt(c,16);
    let r=(n>>16)+percent, g=((n>>8)&255)+percent, b=(n&255)+percent;
    r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
    return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
  }
  loadConfig();

  // ─── Close (postMessage to parent) ───
  document.getElementById('closeBtn').addEventListener('click',()=>{
    try{ window.parent.postMessage({type:'aics:close'}, '*'); }catch(e){}
  });

  // ─── Messaging ───
  function addUser(text){
    const div = document.createElement('div');
    div.className='msg user';
    div.innerHTML = `<div class="bubble">${esc(text)}</div>`;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }
  function addTyping(){
    const div = document.createElement('div');
    div.className='msg bot';
    div.id='typingMsg';
    div.innerHTML = `<div><div class="bubble" style="padding:8px 12px"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }
  function removeTyping(){ const t = document.getElementById('typingMsg'); if(t) t.remove(); }
  function addBot(reply, meta){
    const state = (meta?.state || 'RESOLVED').toUpperCase();
    let badgeClass = 'badge-resolved';
    if(state === 'ESCALATED') badgeClass = 'badge-escalated';
    else if(state === 'AWAITING_CUSTOMER') badgeClass = 'badge-await';

    const div = document.createElement('div');
    div.className='msg bot';
    const showMeta = meta && (meta.state || meta.escalated);
    div.innerHTML = `<div><div class="bubble">${esc(reply)}</div>${showMeta?`<div class="msg-meta"><span class="badge-mono ${badgeClass}">${state}</span></div>`:''}</div>`;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }
  function esc(s){ return String(s).replace(/[&<>"']/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function localFallback(message){
    const m = message.toLowerCase();
    if(m.includes('status') || m.includes('pesanan'))
      return {reply:"Saya bisa cek status pesanan Anda. Mohon berikan nomor pesanannya (5-6 digit).", state:"AWAITING_CUSTOMER"};
    if(m.includes('refund'))
      return {reply:"Refund di bawah Rp 100.000 bisa diproses otomatis. Untuk di atas itu akan diteruskan ke tim kami. Berikan nomor pesanan & alasan refund.", state:"RESOLVED"};
    if(m.includes('password'))
      return {reply:"Saya akan generate link reset password ke email terdaftar Anda. Mohon konfirmasi email Anda.", state:"AWAITING_CUSTOMER"};
    if(m.includes('produk'))
      return {reply:"Anda bisa lihat katalog lengkap di halaman utama, atau ceritakan kategori yang dicari — saya bantu rekomendasikan.", state:"RESOLVED"};
    return {reply:"Terima kasih atas pesannya. Saya teruskan ke tim kami untuk dijawab lebih akurat.", state:"AWAITING_CUSTOMER"};
  }

  async function send(text){
    if(!text || !text.trim()) return;
    addUser(text);
    input.value=''; sendBtn.disabled=true;
    chips.style.display='none';
    addTyping();
    let result;
    try{
      const res = await fetch(SUPABASE_URL+'/functions/v1/cs-demo',{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},
        body: JSON.stringify({message:text, session_id:sessionId, tenant})
      });
      if(!res.ok) throw new Error('http '+res.status);
      result = await res.json();
    }catch(err){
      await new Promise(r=>setTimeout(r,800));
      result = localFallback(text);
    }
    removeTyping();
    addBot(result.reply || result.message || 'Maaf, terjadi kendala.', result);
    sendBtn.disabled=false;
    input.focus();
  }

  form.addEventListener('submit',(e)=>{ e.preventDefault(); send(input.value); });
  chips.addEventListener('click',(e)=>{
    const btn = e.target.closest('.chip');
    if(!btn) return;
    send(btn.dataset.msg);
  });
</script>

</body>
</html>

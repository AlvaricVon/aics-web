<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Reset password · AICS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#FAFAF7;--surface:#FFFFFF;--surface-alt:#F5F4F1;
    --text:#1C1917;--text-soft:#44403C;--muted:#78716C;
    --border:#E7E5E4;--border-strong:#D6D3D1;
    --accent:#C2410C;--accent-hover:#9A3412;
    --success:#15803D;--danger:#DC2626;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100vh}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  .wrap{min-height:100vh;display:grid;place-items:center;padding:32px}
  .card-wrap{width:100%;max-width:400px}
  .brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px;font-weight:700;letter-spacing:-.02em}
  .mark{width:34px;height:34px;border-radius:8px;background:var(--text);color:var(--bg);display:grid;place-items:center;font-size:14px;font-weight:800}
  .name{font-size:16px}
  .name small{display:block;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;box-shadow:0 12px 32px -16px rgba(28,25,23,.10)}
  h1{font-size:22px;font-weight:700;letter-spacing:-.015em;margin:0 0 4px}
  .sub{font-size:13.5px;color:var(--text-soft);margin:0 0 24px}

  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
  label{font-size:13px;font-weight:600;color:var(--text)}
  label .opt{font-weight:500;color:var(--muted);font-size:12px;margin-left:6px}
  input{font-family:inherit;font-size:14.5px;padding:11px 13px;border:1px solid var(--border-strong);border-radius:7px;background:var(--surface);color:var(--text);outline:none;width:100%;transition:all .12s}
  input:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(28,25,23,.06)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:7px;font-weight:600;font-size:14px;border:1px solid transparent;transition:all .15s;cursor:pointer;width:100%}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 6px 16px -6px rgba(194,65,12,.32)}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}

  .alert{padding:10px 12px;border-radius:7px;font-size:13px;margin-bottom:14px;display:none}
  .alert.show{display:block}
  .alert.error{background:#FEF2F2;color:var(--danger);border:1px solid #FECACA}
  .alert.success{background:#F0FDF4;color:var(--success);border:1px solid #BBF7D0}

  .strength{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
  .strength > div{height:100%;width:0;transition:all .25s;background:var(--danger)}
  .strength.s1 > div{width:33%;background:var(--danger)}
  .strength.s2 > div{width:66%;background:#D97706}
  .strength.s3 > div{width:100%;background:var(--success)}
  .strength-label{font-size:11.5px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace}

  .foot{text-align:center;font-size:12.5px;color:var(--muted);margin-top:24px;font-family:'JetBrains Mono',monospace}
  .foot a{color:var(--text-soft);font-weight:600}

  .panel-mode{display:none}
  .panel-mode.active{display:block}
  .success-icon{
    width:48px;height:48px;border-radius:50%;background:#F0FDF4;color:var(--success);
    display:grid;place-items:center;margin:0 auto 16px;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="card-wrap">
    <div class="brand">
      <span class="mark">AI</span>
      <span class="name">AICS<small>by Kamil Alfaris</small></span>
    </div>

    <div class="card">
      <!-- REQUEST RESET MODE -->
      <div class="panel-mode active" id="modeRequest">
        <h1>Lupa password?</h1>
        <p class="sub">Masukkan email akun Anda. Kami kirim link reset.</p>
        <div class="alert error" id="reqError"></div>
        <div class="alert success" id="reqSuccess"></div>
        <form id="reqForm">
          <div class="field">
            <label>Email</label>
            <input type="email" id="reqEmail" placeholder="anda@toko.com" required autocomplete="email" />
          </div>
          <button type="submit" class="btn btn-primary" id="reqBtn">Kirim link reset →</button>
        </form>
      </div>

      <!-- SET NEW PASSWORD MODE -->
      <div class="panel-mode" id="modeReset">
        <h1>Buat password baru</h1>
        <p class="sub">Minimum 8 karakter. Anda akan otomatis login setelah berhasil.</p>
        <div class="alert error" id="resetError"></div>
        <form id="resetForm">
          <div class="field">
            <label>Password baru</label>
            <input type="password" id="newPass" placeholder="••••••••" required minlength="8" autocomplete="new-password" />
            <div class="strength" id="strength"><div></div></div>
            <div class="strength-label" id="strengthLabel">min. 8 karakter</div>
          </div>
          <div class="field">
            <label>Konfirmasi password</label>
            <input type="password" id="confirmPass" placeholder="••••••••" required autocomplete="new-password" />
          </div>
          <button type="submit" class="btn btn-primary" id="resetBtn">Simpan & masuk →</button>
        </form>
      </div>

      <!-- SUCCESS MODE -->
      <div class="panel-mode" id="modeSuccess">
        <div class="success-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1 style="text-align:center">Password berhasil diubah</h1>
        <p class="sub" style="text-align:center">Mengalihkan ke dashboard…</p>
      </div>
    </div>

    <div class="foot"><a href="/admin.html">← Kembali ke login</a></div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0';
  const SUPABASE_URL = 'https://stcywvcnbbapshrzqblk.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_WUxbFG3866P7BANLSqv-Sw_4NcXMLSr';
  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  const modeRequest = document.getElementById('modeRequest');
  const modeReset = document.getElementById('modeReset');
  const modeSuccess = document.getElementById('modeSuccess');
  function show(el){
    [modeRequest,modeReset,modeSuccess].forEach(m=>m.classList.remove('active'));
    el.classList.add('active');
  }

  // Detect reset token (Supabase puts access_token in hash after redirect)
  const hash = new URLSearchParams(location.hash.replace(/^#/,''));
  if(hash.get('access_token') || location.hash.includes('type=recovery')){
    show(modeReset);
  }

  // ─── Request reset ───
  document.getElementById('reqForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const email = document.getElementById('reqEmail').value;
    const btn = document.getElementById('reqBtn');
    const err = document.getElementById('reqError');
    const ok = document.getElementById('reqSuccess');
    err.classList.remove('show'); ok.classList.remove('show');
    btn.disabled = true; btn.textContent = 'Mengirim…';
    try{
      const { error } = await supabase.auth.resetPasswordForEmail(email,{
        redirectTo: location.origin + '/reset-password.html'
      });
      if(error) throw error;
      ok.textContent = '✓ Cek email Anda. Klik link untuk lanjut reset.';
      ok.classList.add('show');
    }catch(e2){
      err.textContent = e2.message || 'Gagal mengirim email. Coba lagi.';
      err.classList.add('show');
    }
    btn.disabled = false; btn.textContent = 'Kirim link reset →';
  });

  // ─── Strength meter ───
  const newPass = document.getElementById('newPass');
  const strength = document.getElementById('strength');
  const strengthLabel = document.getElementById('strengthLabel');
  newPass?.addEventListener('input',()=>{
    const v = newPass.value;
    let score = 0;
    if(v.length >= 8) score++;
    if(/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
    if(/[0-9]/.test(v) || /[^A-Za-z0-9]/.test(v)) score++;
    strength.className = 'strength s'+score;
    strengthLabel.textContent = score===0? 'min. 8 karakter' : score===1? 'lemah' : score===2? 'cukup' : 'kuat';
  });

  // ─── Set new password ───
  document.getElementById('resetForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const p1 = document.getElementById('newPass').value;
    const p2 = document.getElementById('confirmPass').value;
    const err = document.getElementById('resetError');
    const btn = document.getElementById('resetBtn');
    err.classList.remove('show');
    if(p1 !== p2){ err.textContent='Password tidak cocok.'; err.classList.add('show'); return; }
    if(p1.length < 8){ err.textContent='Minimum 8 karakter.'; err.classList.add('show'); return; }
    btn.disabled = true; btn.textContent='Menyimpan…';
    try{
      const { error } = await supabase.auth.updateUser({ password: p1 });
      if(error) throw error;
      show(modeSuccess);
      setTimeout(()=>{ location.href = '/dashboard.html'; }, 1500);
    }catch(e2){
      err.textContent = e2.message || 'Gagal menyimpan password.';
      err.classList.add('show');
      btn.disabled = false; btn.textContent='Simpan & masuk →';
    }
  });
</script>

</body>
</html>

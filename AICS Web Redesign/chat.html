<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Chat support</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#FAFAF7;font-family:system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .shell{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;min-height:100dvh;padding:0;
  }
  .frame{
    width:100%;max-width:480px;height:100vh;height:100dvh;max-height:760px;
    border:1px solid #E7E5E4;border-radius:0;background:#fff;overflow:hidden;
    box-shadow:0 24px 64px -24px rgba(28,25,23,.18);
    display:flex;flex-direction:column;
  }
  @media (min-width:640px){
    .shell{padding:32px}
    .frame{border-radius:14px}
  }
  iframe{flex:1;width:100%;border:none;display:block}
  .err{padding:40px;text-align:center;color:#78716C;font-size:14px}
  .err strong{color:#1C1917;display:block;margin-bottom:6px;font-size:16px;font-weight:700}
</style>
</head>
<body>
<div class="shell">
  <div class="frame">
    <iframe id="chatFrame" title="AICS chat" allow="clipboard-write"></iframe>
  </div>
</div>
<script>
  (function(){
    // Slug from URL: /c/<slug> or ?t=<slug>
    const url = new URL(location.href);
    let slug = url.searchParams.get('t') || url.searchParams.get('tenant');
    if(!slug){
      const m = url.pathname.match(/\/c\/([a-z0-9-]+)/i);
      if(m) slug = m[1];
    }
    if(!slug) slug = 'demo';
    document.title = `Chat support · ${slug}`;
    document.getElementById('chatFrame').src = `/widget.html?t=${encodeURIComponent(slug)}`;
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — AICS</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root { --bg: #FAFAF7; --surface: #FFFFFF; --text: #1C1917; --text-soft: #44403C; --muted: #78716C; --border: #E7E5E4; --accent: #C2410C; --success: #15803D; --success-bg: #DCFCE7; --danger: #DC2626; --danger-bg: #FEE2E2; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 36px; width: 100%; max-width: 420px; box-shadow: 0 24px 60px -24px rgba(28, 25, 23, 0.1); }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; margin-bottom: 24px; }
  .brand .mark { width: 28px; height: 28px; background: var(--text); color: var(--bg); border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.02em; }
  p { color: var(--text-soft); font-size: 14px; margin-bottom: 22px; line-height: 1.55; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 7px; font-size: 14.5px; font-family: inherit; outline: none; margin-bottom: 14px; background: var(--bg); }
  input:focus { border-color: var(--text); }
  button { width: 100%; background: var(--text); color: var(--bg); border: none; padding: 12px; border-radius: 7px; font-weight: 600; font-size: 14.5px; cursor: pointer; font-family: inherit; }
  button:hover:not(:disabled) { background: var(--accent); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg { padding: 12px 14px; border-radius: 7px; font-size: 13.5px; margin-top: 12px; display: none; line-height: 1.5; }
  .msg.success { background: var(--success-bg); color: #166534; display: block; }
  .msg.error { background: var(--danger-bg); color: #991B1B; display: block; }
  .alt { margin-top: 16px; text-align: center; font-size: 13px; color: var(--text-soft); }
  .alt a { color: var(--accent); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>

<div class="card">
  <div class="brand">
    <span class="mark">AI</span>
    AICS
  </div>
  <h1>Set password baru</h1>
  <p id="intro">Masukkan password baru Anda. Setelah ini, Anda akan otomatis login.</p>

  <form id="form">
    <label>Password baru</label>
    <input type="password" id="pw" required minlength="8" placeholder="Min. 8 karakter" />
    <label>Konfirmasi password</label>
    <input type="password" id="pw2" required minlength="8" />
    <button type="submit" id="btn">Set password baru</button>
  </form>
  <div class="msg" id="msg"></div>

  <div class="alt">
    <a href="/dashboard">← Kembali ke login</a>
  </div>
</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2.45.0";
  const sb = createClient("https://stcywvcnbbapshrzqblk.supabase.co", "sb_publishable_WUxbFG3866P7BANLSqv-Sw_4NcXMLSr");

  const form = document.getElementById("form");
  const btn = document.getElementById("btn");
  const msg = document.getElementById("msg");
  const intro = document.getElementById("intro");

  // Wait for Supabase to detect session from URL fragment
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    intro.textContent = "Mendeteksi sesi reset password...";
    // Listen for session detection (Supabase auto-handles hash params)
    sb.auth.onAuthStateChange((event, s) => {
      if (event === "PASSWORD_RECOVERY" || (event === "SIGNED_IN" && s)) {
        intro.textContent = "Masukkan password baru Anda. Setelah ini, Anda akan otomatis login.";
      }
    });
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.style.display = "none";
    const pw = document.getElementById("pw").value;
    const pw2 = document.getElementById("pw2").value;
    if (pw !== pw2) { showError("Password tidak cocok."); return; }
    if (pw.length < 8) { showError("Min. 8 karakter."); return; }
    btn.disabled = true; btn.textContent = "Menyimpan...";
    const { error } = await sb.auth.updateUser({ password: pw });
    btn.disabled = false; btn.textContent = "Set password baru";
    if (error) { showError(error.message); return; }
    showSuccess("Password berhasil diubah. Mengalihkan ke dashboard...");
    setTimeout(() => location.href = "/dashboard", 1500);
  });

  function showError(t) { msg.className = "msg error"; msg.textContent = t; msg.style.display = "block"; }
  function showSuccess(t) { msg.className = "msg success"; msg.textContent = t; msg.style.display = "block"; }
</script>

</body>
</html>

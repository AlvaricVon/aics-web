<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat Support</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; }
  iframe { width: 100%; height: 100%; border: 0; display: block; }
  .err { padding: 60px 20px; text-align: center; color: #666; }
</style>
</head>
<body>
<iframe id="frame" src="about:blank"></iframe>
<script>
  // Extract slug from path: /c/[slug] or query ?t=[slug]
  const path = location.pathname;
  const match = path.match(/^\/c\/([a-z0-9\-]+)\/?$/);
  const params = new URLSearchParams(location.search);
  const slug = (match && match[1]) || params.get("t");
  if (!slug) {
    document.body.innerHTML = `<div class="err">URL tidak valid. Format: /c/[slug]</div>`;
  } else {
    document.title = `Chat dengan ${slug}`;
    document.getElementById("frame").src = `/widget.html?t=${encodeURIComponent(slug)}&standalone=1`;
  }
</script>
</body>
</html>
